name: Build
run-name: ${{ gitea.actor }} 

on:
  push:
    branches: [main, dev]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - '**/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - '**/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          docker run --rm \
            -v "$(pwd)/src:/app/src:ro" \
            -w /app \
            oven/bun:1-alpine \
            bun test ./src

      - name: Log in to Gitea container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE=$(echo "${{ vars.REGISTRY }}/${{ gitea.repository }}" | tr '[:upper:]' '[:lower:]')
          BRANCH="${{ gitea.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            TAG="latest"
          elif [ "$BRANCH" = "dev" ]; then
            TAG="dev"
          else
            echo "Not on main or dev, skipping push."
            docker build .
            exit 0
          fi
          docker build -t $IMAGE:${{ gitea.sha }} -t $IMAGE:$TAG .
          docker push $IMAGE:${{ gitea.sha }}
          docker push $IMAGE:$TAG
